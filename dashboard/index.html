<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPUFlow Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>GPUFlow</h1>
    <span id="api-key-status"></span>
    <button id="set-key-btn" onclick="promptApiKey()">Set API Key</button>
  </header>

  <main>
    <section id="gpu-section">
      <h2>GPUs</h2>
      <div id="gpu-cards"></div>
    </section>

    <section id="jobs-section">
      <h2>Jobs</h2>
      <div id="filter-bar">
        <select id="status-filter" onchange="refresh()">
          <option value="">All</option>
          <option value="queued">Queued</option>
          <option value="running">Running</option>
          <option value="completed">Completed</option>
          <option value="failed">Failed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <table id="jobs-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Status</th>
            <th>GPUs</th>
            <th>Image</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="jobs-body"></tbody>
      </table>
      <p id="no-jobs" style="display:none">No jobs found.</p>
    </section>

    <section id="log-section" style="display:none">
      <h2>Logs — <span id="log-job-id"></span> <button onclick="closeLog()">×</button></h2>
      <pre id="log-content"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
