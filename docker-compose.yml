version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gpuflow-logs:/app/logs
      - gpuflow-db:/app/data
    env_file: .env
    environment:
      - DB_PATH=/app/data/gpuflow.db
      - LOG_DIR=/app/logs
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  gpuflow-logs:
  gpuflow-db:
